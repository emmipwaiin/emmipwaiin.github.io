<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋪磚挑戰</title>
    <style>
        :root {
            --ipad-bg: #f4f6f9;
            --land-border: #2c3e50;
            --purple-tile: #9b59b6;
            --blue-tile: #3498db;
        }

        body {
            font-family: '微軟正黑體', sans-serif;
            background-color: var(--ipad-bg);
            text-align: center;
            user-select: none;
            overflow-y: auto; 
            margin: 0;
            padding-bottom: 160px; 
            touch-action: pan-y; /* 允許垂直捲動 */
        }

        h1 { color: #2c3e50; margin: 20px 0 5px 0; font-size: 28px; }
        .subtitle { font-size: 16px; color: #7f8c8d; margin-bottom: 20px; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 92vw; 
            max-width: 1000px;
            margin: 0 auto;
            background-color: #bdc3c7;
            gap: 3px;
            border: 3px solid #7f8c8d;
            border-radius: 12px;
            overflow: hidden;
        }

        .header {
            background-color: #dfe6e9;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .cell {
            background-color: white;
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .land {
            border: 2px solid var(--land-border);
            background-color: #ffffff;
            position: relative;
            box-sizing: content-box;
        }

        .status {
            position: absolute;
            right: 15px;
            font-size: 60px;
            font-family: "Arial Black", sans-serif;
            pointer-events: none;
            z-index: 100;
        }
        .ok { color: #27ae60; }
        .no { color: #e74c3c; opacity: 0.8; }

        .palette {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(5px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
            touch-action: none; 
            border-top: 1px solid #ddd;
        }

        .source-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none; 
        }

        .sq-purple { width: 40px; height: 40px; background-color: var(--purple-tile); border: 1.5px solid #fff; box-sizing: border-box; }
        .sq-blue { width: 80px; height: 80px; background-color: var(--blue-tile); border: 1.5px solid #fff; box-sizing: border-box; }

        /* 拖拽圖形：使用 fixed 以確保不會受頁面捲動影響視覺位置 */
        .dragging {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
            opacity: 0.9;
            transform: translate(0, 0); /* 確保硬體加速 */
        }

        .placed-tile {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.7);
            box-sizing: border-box;
            cursor: pointer;
        }

        button { 
            padding: 15px 30px; 
            border-radius: 12px; 
            border: none; 
            background: #2c3e50; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>🏰 鋪磚挑戰</h1>
    <div class="subtitle">拖動方塊填滿土地。指尖對準中心拖動。</div>

    <div class="grid-container">
        <div class="header">邊長 1cm</div>
        <div class="header">邊長 2cm</div>

        <!-- 四組圖形 -->
        <div class="cell"><div id="L1" class="land" style="width:160px; height:160px;"></div><div id="S-L1" class="status"></div></div>
        <div class="cell"><div id="R1" class="land" style="width:160px; height:160px;"></div><div id="S-R1" class="status"></div></div>

        <div class="cell"><div id="L2" class="land" style="width:160px; height:120px;"></div><div id="S-L2" class="status"></div></div>
        <div class="cell"><div id="R2" class="land" style="width:160px; height:120px;"></div><div id="S-R2" class="status"></div></div>

        <div class="cell"><div id="L3" class="land" style="width:160px; height:80px;"></div><div id="S-L3" class="status"></div></div>
        <div class="cell"><div id="R3" class="land" style="width:160px; height:80px;"></div><div id="S-R3" class="status"></div></div>

        <div class="cell"><div id="L4" class="land" style="width:160px; height:40px;"></div><div id="S-L4" class="status"></div></div>
        <div class="cell"><div id="R4" class="land" style="width:160px; height:40px;"></div><div id="S-R4" class="status"></div></div>
    </div>

    <div class="palette">
        <div class="source-box" onmousedown="grab(event, 40, '#9b59b6', 'L')" ontouchstart="grab(event, 40, '#9b59b6', 'L')">
            <div class="sq-purple"></div>
            <div style="margin-top:8px; font-weight:bold;">1cm 磚塊</div>
        </div>
        
        <button onclick="location.reload()">🔄 全部重來</button>

        <div class="source-box" onmousedown="grab(event, 80, '#3498db', 'R')" ontouchstart="grab(event, 80, '#3498db', 'R')">
            <div class="sq-blue"></div>
            <div style="margin-top:8px; font-weight:bold;">2cm 磚塊</div>
        </div>
    </div>

    <script>
        let dragEl = null;
        let dSize = 0;
        let dColor = '';
        let dSide = ''; 

        function grab(e, size, color, side) {
            // 取得當前點擊座標 (相對於視窗 clientX, clientY)
            const touch = e.touches ? e.touches[0] : e;
            dSize = size;
            dColor = color;
            dSide = side;

            dragEl = document.createElement('div');
            dragEl.className = 'dragging';
            dragEl.style.width = size + 'px';
            dragEl.style.height = size + 'px';
            dragEl.style.backgroundColor = color;
            document.body.appendChild(dragEl);
            
            // 初始定位
            updatePos(touch.clientX, touch.clientY);

            const move = (ev) => {
                if (ev.cancelable) ev.preventDefault(); // 禁止拖動時捲動頁面
                const t = ev.touches ? ev.touches[0] : ev;
                updatePos(t.clientX, t.clientY);
            };

            const stop = (ev) => {
                const t = ev.changedTouches ? ev.changedTouches[0] : ev;
                putDown(t.clientX, t.clientY);
                window.removeEventListener('mousemove', move);
                window.removeEventListener('touchmove', move);
                window.removeEventListener('mouseup', stop);
                window.removeEventListener('touchend', stop);
                if (dragEl) dragEl.remove();
                dragEl = null;
            };

            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchend', stop);
        }

        // 解決同步問題的核心：使用 fixed 定位並根據視窗 client 座標計算
        function updatePos(clientX, clientY) {
            if (!dragEl) return;
            // 指尖要在圖形正中心，所以要扣掉圖形寬高的一半
            dragEl.style.left = (clientX - dSize / 2) + 'px';
            dragEl.style.top = (clientY - dSize / 2) + 'px';
        }

        function putDown(clientX, clientY) {
            const lands = dSide === 'L' ? ['L1','L2','L3','L4'] : ['R1','R2','R3','R4'];
            
            for (let id of lands) {
                const el = document.getElementById(id);
                const rect = el.getBoundingClientRect(); // getBoundingClientRect 是相對於視窗的座標

                if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
                    // 計算在長方形內的相對座標
                    let relX = clientX - rect.left;
                    let relY = clientY - rect.top;

                    // 磁吸網格
                    let snapX = Math.floor(relX / dSize) * dSize;
                    let snapY = Math.floor(relY / dSize) * dSize;

                    if (snapX + dSize > el.offsetWidth + 2 || snapY + dSize > el.offsetHeight + 2) {
                        continue; 
                    }

                    const isOverlap = Array.from(el.children).some(child => 
                        Math.abs(parseInt(child.style.left) - snapX) < 5 && 
                        Math.abs(parseInt(child.style.top) - snapY) < 5
                    );

                    if (!isOverlap) {
                        const tile = document.createElement('div');
                        tile.className = 'placed-tile';
                        tile.style.width = dSize + 'px';
                        tile.style.height = dSize + 'px';
                        tile.style.left = snapX + 'px';
                        tile.style.top = snapY + 'px';
                        tile.style.backgroundColor = dColor;
                        tile.onclick = () => { 
                            tile.remove(); 
                            updateStatus(id); 
                        };
                        el.appendChild(tile);
                        updateStatus(id);
                    }
                    break;
                }
            }
        }

        function updateStatus(id) {
            const el = document.getElementById(id);
            const statusEl = document.getElementById('S-' + id);
            const tiles = el.children.length;
            const specs = {'1': { w: 4, h: 4 }, '2': { w: 4, h: 3 }, '3': { w: 4, h: 2 }, '4': { w: 4, h: 1 }};
            const num = id.substring(1);
            const spec = specs[num];
            const isLeft = id.startsWith('L');
            
            if (isLeft) {
                const needed = spec.w * spec.h;
                statusEl.innerText = (tiles >= needed) ? "✓" : "";
                statusEl.className = "status ok";
            } else {
                const canFit = (spec.w * 40 % 80 === 0) && (spec.h * 40 % 80 === 0);
                if (!canFit) {
                    statusEl.innerText = (tiles > 0) ? "✕" : "";
                    statusEl.className = "status no";
                } else {
                    const needed = (spec.w * 40 / 80) * (spec.h * 40 / 80);
                    statusEl.innerText = (tiles >= needed) ? "✓" : "";
                    statusEl.className = "status ok";
                }
            }
        }
    </script>
</body>
</html>
